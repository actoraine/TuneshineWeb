<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tuneshine Control Panel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Tuneshine</p>
          <h1>Device Control Panel</h1>
        </div>
        <button id="theme-toggle" class="ghost-button" type="button" aria-label="Toggle theme">Toggle Theme</button>
      </header>

      <section>
        <h2 class="ops-title">Available Actions</h2>
        <div id="operations-container" class="operation-grid"></div>
      </section>
    </div>

    <section class="status-dock" aria-live="polite">
      <div class="status-panel">
        <h2>Status</h2>
        <div id="status-output" class="status-output">Loading API specification...</div>
      </div>
    </section>

    <script type="module" src="/app.js"></script>
  </body>
</html>
